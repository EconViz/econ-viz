[project]
name = "econ-viz"
version = "0.1.0"
description = "A Python tool to generate beautiful microeconomics plots."
authors = [{ name = "Anthony Sung", email = "sungpinyue@gmail.com" }]
license = { text = "MIT" }
requires-python = ">=3.12,<4.0"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = ["numpy (>=2.4.3,<3.0.0)", "matplotlib (>=3.10.8,<4.0.0)", "matplot2tikz (>=0.5.4,<0.6.0)", "scipy (>=1.17.1,<2.0.0)", "sympy (>=1.14.0,<2.0.0)"]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
