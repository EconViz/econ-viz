name: Publish to PyPI

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run tests
        run: poetry run pytest

  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    needs: test
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Build
        run: poetry build

      - name: Check if version already exists on PyPI
        id: version_check
        run: |
          VERSION=$(poetry version -s)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/econ-viz/$VERSION/json)
          if [ "$STATUS" = "200" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already on PyPI, skipping publish."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION not on PyPI, will publish."
          fi

      - name: Publish to PyPI
        if: steps.version_check.outputs.skip == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
