name: CI / Publish

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run tests
        run: poetry run pytest

  release:
    name: Release & publish
    runs-on: ubuntu-latest
    needs: test
    environment: pypi
    permissions:
      id-token: write   # PyPI Trusted Publisher
      contents: write   # push version-bump commit + tag

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # semantic-release needs full history
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install poetry python-semantic-release

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version & tag
        id: release
        run: semantic-release version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if a new version was created
        id: check
        run: |
          git describe --exact-match HEAD 2>/dev/null \
            && echo "released=true" >> $GITHUB_OUTPUT \
            || echo "released=false" >> $GITHUB_OUTPUT

      - name: Build
        if: steps.check.outputs.released == 'true'
        run: poetry build

      - name: Publish to PyPI
        if: steps.check.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
